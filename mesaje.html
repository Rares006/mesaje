<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabăra 2025 - Mesaje QR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #4c63d2;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 10px;
        }

        .nav-tab {
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .nav-tab.active {
            background: rgba(255, 255, 255, 0.9);
            color: #4c63d2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .nav-tab:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
        }

        .tab-content {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4c63d2;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #4c63d2;
            box-shadow: 0 0 0 3px rgba(76, 99, 210, 0.1);
        }

        .btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
        }

        .participants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .participant-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #e8f0ff 100%);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .participant-card:hover {
            transform: translateY(-5px);
        }

        .participant-name {
            font-size: 18px;
            font-weight: 600;
            color: #4c63d2;
            margin-bottom: 10px;
        }

        .qr-code {
            text-align: center;
            margin: 15px 0;
        }

        .qr-code canvas {
            border: 3px solid #4c63d2;
            border-radius: 10px;
            padding: 10px;
            background: white;
        }

        .messages-container {
            max-height: 200px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
        }

        .message {
            background: rgba(76, 99, 210, 0.1);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #4c63d2;
        }

        .message-time {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .camera-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        #video {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .scan-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border: 3px solid #4c63d2;
            border-radius: 10px;
            background: rgba(76, 99, 210, 0.1);
            pointer-events: none;
        }

        .scan-overlay::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border: 3px solid #4c63d2;
            border-radius: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(76, 99, 210, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(76, 99, 210, 0); }
            100% { box-shadow: 0 0 0 0 rgba(76, 99, 210, 0); }
        }

        .message-form {
            background: rgba(76, 99, 210, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }

        .hidden {
            display: none;
        }

        .success-message {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .error-message {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #4c63d2;
            font-size: 18px;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        @media (max-width: 768px) {
            .nav-tabs {
                flex-direction: column;
                align-items: center;
            }
            
            .nav-tab {
                width: 200px;
                margin-bottom: 10px;
            }
            
            .participants-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏕️ Tabăra 2025</h1>
            <p>Sistem de mesaje cu coduri QR</p>
        </div>

        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('admin')">👨‍💼 Administrare</button>
            <button class="nav-tab" onclick="showTab('scan')">📱 Scanare QR</button>
        </div>

        <!-- Administrare Tab -->
        <div id="admin" class="tab-content active">
            <h2>Administrare Participanți</h2>
            
            <div class="form-group">
                <label for="participantName">Numele participantului:</label>
                <input type="text" id="participantName" placeholder="Introduceți numele...">
            </div>

            <div class="form-group">
                <label for="participantNickname">Porecla (opțional):</label>
                <input type="text" id="participantNickname" placeholder="Porecla...">
            </div>

            <div class="form-group">
                <label for="participantColor">Culoare personalizată:</label>
                <input type="color" id="participantColor" value="#4c63d2">
            </div>

            <button class="btn" onclick="addParticipant()">➕ Adaugă Participant</button>
            <button class="btn btn-danger" onclick="clearAllData()">🗑️ Șterge Toate Datele</button>

            <div id="participantsContainer" class="participants-grid">
                <!-- Participanții vor fi afișați aici -->
            </div>
        </div>

        <!-- Scanare QR Tab -->
        <div id="scan" class="tab-content">
            <h2>Scanare Cod QR</h2>
            
            <div class="camera-container">
                <video id="video" autoplay muted playsinline></video>
                <div class="scan-overlay"></div>
            </div>
            
            <div style="text-align: center; margin: 20px 0;">
                <button class="btn" onclick="startScanning()">📷 Pornește Camera</button>
                <button class="btn btn-danger" onclick="stopScanning()">🛑 Oprește Camera</button>
            </div>

            <div id="messageForm" class="message-form hidden">
                <h3>Trimite un mesaj către <span id="targetName"></span></h3>
                
                <div class="form-group">
                    <label for="senderName">Numele tău:</label>
                    <input type="text" id="senderName" placeholder="Cum te numești?">
                </div>

                <div class="form-group">
                    <label for="messageType">Tipul mesajului:</label>
                    <select id="messageType">
                        <option value="message">📝 Mesaj simplu</option>
                        <option value="compliment">💝 Compliment</option>
                        <option value="memory">🌟 Amintire frumoasă</option>
                        <option value="joke">😂 Glumă</option>
                        <option value="encouragement">💪 Încurajare</option>
                        <option value="gratitude">🙏 Mulțumire</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="messageContent">Mesajul tău:</label>
                    <textarea id="messageContent" rows="4" placeholder="Scrie aici mesajul tău..."></textarea>
                </div>

                <button class="btn" onclick="sendMessage()">📨 Trimite Mesajul</button>
                <button class="btn btn-danger" onclick="cancelMessage()">❌ Anulează</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, Timestamp, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Configurația Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAA1ytLJrwh7JHSOwGQrf2t_5imgtiWLk4",
            authDomain: "tabara-2025-95ff5.firebaseapp.com",
            projectId: "tabara-2025-95ff5",
            storageBucket: "tabara-2025-95ff5.firebasestorage.app",
            messagingSenderId: "552618851743",
            appId: "1:552618851743:web:tabara2025app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Variabile globale
        let stream = null;
        let currentParticipantId = null;
        let scanning = false;

        // Funcții pentru tabs
        window.showTab = function(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.nav-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'scan') {
                setTimeout(() => {
                    loadQRLibrary();
                }, 100);
            }
        };

        // Funcții pentru administrare
        window.addParticipant = async function() {
            const name = document.getElementById('participantName').value.trim();
            const nickname = document.getElementById('participantNickname').value.trim();
            const color = document.getElementById('participantColor').value;
            
            if (!name) {
                alert('Vă rugăm introduceți numele participantului!');
                return;
            }
            
            try {
                const docRef = await addDoc(collection(db, 'participants'), {
                    name: name,
                    nickname: nickname,
                    color: color,
                    createdAt: Timestamp.now(),
                    messages: []
                });
                
                document.getElementById('participantName').value = '';
                document.getElementById('participantNickname').value = '';
                document.getElementById('participantColor').value = '#4c63d2';
                
                loadParticipants();
                showMessage('Participantul a fost adăugat cu succes!', 'success');
            } catch (error) {
                console.error('Eroare la adăugarea participantului:', error);
                showMessage('Eroare la adăugarea participantului!', 'error');
            }
        };

        window.deleteParticipant = async function(participantId) {
            if (!confirm('Sigur doriți să ștergeți acest participant și toate mesajele lui?')) {
                return;
            }
            
            try {
                await deleteDoc(doc(db, 'participants', participantId));
                loadParticipants();
                showMessage('Participantul a fost șters cu succes!', 'success');
            } catch (error) {
                console.error('Eroare la ștergerea participantului:', error);
                showMessage('Eroare la ștergerea participantului!', 'error');
            }
        };

        window.clearAllData = async function() {
            if (!confirm('ATENȚIE: Această acțiune va șterge toți participanții și toate mesajele! Sigur doriți să continuați?')) {
                return;
            }
            
            try {
                const querySnapshot = await getDocs(collection(db, 'participants'));
                const deletePromises = querySnapshot.docs.map(doc => deleteDoc(doc.ref));
                await Promise.all(deletePromises);
                
                loadParticipants();
                showMessage('Toate datele au fost șterse cu succes!', 'success');
            } catch (error) {
                console.error('Eroare la ștergerea datelor:', error);
                showMessage('Eroare la ștergerea datelor!', 'error');
            }
        };

        // Funcții pentru mesaje
        function showMessage(message, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = type === 'success' ? 'success-message' : 'error-message';
            messageDiv.textContent = message;
            
            const container = document.querySelector('.tab-content.active');
            container.insertBefore(messageDiv, container.firstChild);
            
            setTimeout(() => {
                messageDiv.remove();
            }, 3000);
        }

        // Încărcare participanți
        async function loadParticipants() {
            try {
                const querySnapshot = await getDocs(query(collection(db, 'participants'), orderBy('createdAt')));
                const container = document.getElementById('participantsContainer');
                container.innerHTML = '';
                
                querySnapshot.forEach((doc) => {
                    const participant = doc.data();
                    const participantCard = createParticipantCard(doc.id, participant);
                    container.appendChild(participantCard);
                });
            } catch (error) {
                console.error('Eroare la încărcarea participanților:', error);
            }
        }

        function createParticipantCard(id, participant) {
            const card = document.createElement('div');
            card.className = 'participant-card';
            card.style.borderLeft = `5px solid ${participant.color}`;
            
            const displayName = participant.nickname ? `${participant.name} (${participant.nickname})` : participant.name;
            
            card.innerHTML = `
                <div class="participant-name">${displayName}</div>
                <div class="qr-code">
                    <canvas id="qr-${id}"></canvas>
                </div>
                <div>
                    <button class="btn btn-danger" onclick="deleteParticipant('${id}')">🗑️ Șterge</button>
                </div>
                <div class="messages-container">
                    <strong>Mesaje primite (${participant.messages ? participant.messages.length : 0}):</strong>
                    <div id="messages-${id}">
                        ${participant.messages ? participant.messages.map(msg => `
                            <div class="message">
                                <div class="message-time">${new Date(msg.timestamp?.toDate()).toLocaleString('ro-RO')}</div>
                                <strong>${getMessageTypeIcon(msg.type)} ${msg.sender}:</strong>
                                <div>${msg.content}</div>
                            </div>
                        `).join('') : ''}
                    </div>
                </div>
            `;
            
            // Generare QR code
            setTimeout(() => {
                generateQRCode(id, displayName);
            }, 100);
            
            return card;
        }

        function getMessageTypeIcon(type) {
            const icons = {
                'message': '📝',
                'compliment': '💝',
                'memory': '🌟',
                'joke': '😂',
                'encouragement': '💪',
                'gratitude': '🙏'
            };
            return icons[type] || '📝';
        }

        function generateQRCode(participantId, name) {
            const canvas = document.getElementById(`qr-${participantId}`);
            if (!canvas) return;
            
            const qrData = JSON.stringify({
                id: participantId,
                name: name,
                action: 'message'
            });
            
            // Folosim o bibliotecă QR simplă
            const size = 150;
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Fundal alb
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, size, size);
            
            // Simulăm un QR code simplu pentru demonstrație
            ctx.fillStyle = '#000000';
            const cellSize = size / 20;
            
            // Generăm un pattern bazat pe ID-ul participantului
            for (let i = 0; i < 20; i++) {
                for (let j = 0; j < 20; j++) {
                    const hash = hashCode(participantId + i + j);
                    if (hash % 2 === 0) {
                        ctx.fillRect(i * cellSize, j * cellSize, cellSize, cellSize);
                    }
                }
            }
            
            // Adăugăm o etichetă
            ctx.fillStyle = '#4c63d2';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(name.substring(0, 15), size / 2, size - 5);
        }

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash;
        }

        // Funcții pentru scanare QR (simulată)
        window.startScanning = async function() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                document.getElementById('video').srcObject = stream;
                scanning = true;
                
                // Simulăm scanarea QR - în realitate ai folosi o bibliotecă QR
                setTimeout(() => {
                    if (scanning) {
                        simulateQRDetection();
                    }
                }, 3000);
            } catch (error) {
                console.error('Eroare la pornirea camerei:', error);
                showMessage('Nu pot accesa camera!', 'error');
            }
        };

        window.stopScanning = function() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            scanning = false;
            document.getElementById('video').srcObject = null;
        };

        // Simulare detectare QR pentru demonstrație
        function simulateQRDetection() {
            // Pentru demonstrație, folosim primul participant
            getDocs(collection(db, 'participants')).then(querySnapshot => {
                if (!querySnapshot.empty) {
                    const firstDoc = querySnapshot.docs[0];
                    const participant = firstDoc.data();
                    showMessageForm(firstDoc.id, participant.name);
                }
            });
        }

        function showMessageForm(participantId, participantName) {
            currentParticipantId = participantId;
            document.getElementById('targetName').textContent = participantName;
            document.getElementById('messageForm').classList.remove('hidden');
            stopScanning();
        }

        window.sendMessage = async function() {
            const sender = document.getElementById('senderName').value.trim();
            const type = document.getElementById('messageType').value;
            const content = document.getElementById('messageContent').value.trim();
            
            if (!sender || !content) {
                alert('Vă rugăm completați toate câmpurile!');
                return;
            }
            
            try {
                // Obținem documentul participantului
                const participantRef = doc(db, 'participants', currentParticipantId);
                const participantDoc = await getDoc(participantRef);
                
                if (participantDoc.exists()) {
                    const participantData = participantDoc.data();
                    const messages = participantData.messages || [];
                    
                    messages.push({
                        sender: sender,
                        type: type,
                        content: content,
                        timestamp: Timestamp.now()
                    });
                    
                    await updateDoc(participantRef, { messages: messages });
                    
                    // Resetăm formularul
                    document.getElementById('senderName').value = '';
                    document.getElementById('messageContent').value = '';
                    document.getElementById('messageForm').classList.add('hidden');
                    
                    showMessage('Mesajul a fost trimis cu succes!', 'success');
                    
                    // Reîncărcăm participanții pentru a vedea mesajul nou
                    loadParticipants();
                }
            } catch (error) {
                console.error('Eroare la trimiterea mesajului:', error);
                showMessage('Eroare la trimiterea mesajului!', 'error');
            }
        };

        window.cancelMessage = function() {
            document.getElementById('messageForm').classList.add('hidden');
            document.getElementById('senderName').value = '';
            document.getElementById('messageContent').value = '';
        };

        // Funcție pentru încărcarea bibliotecii QR
        function loadQRLibrary() {
            // Aici ai putea încărca o bibliotecă QR reală
            console.log('QR Library loaded');
        }

        // Încărcăm participanții la pornirea aplicației
        loadParticipants();
    </script>
</body>
</html>
